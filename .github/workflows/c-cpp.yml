name: C/C++ CI

on:
  push:
    branches: [ "main*", "release*", "platform/*" ]
  pull_request:
    branches: [ "main*", "release*", "platform/*" ]

permissions:
  actions: read
  checks: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ vars.RUNNER_CI_BUILD || 'ubuntu-24.04' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          cmake \
          libssl-dev \
          fakeroot \
          debhelper

    - name: Build
      run: make RELEASE=1

    - name: Run unit tests
      run: make test

    - name: Build DEB package
      run: make deb

    - name: Build standalone package
      run: make standalone_packages

    - name: Add provenance disclaimer
      shell: bash
      run: |
        set -euo pipefail

        {
           echo "Produced by CI build: ${GITHUB_WORKFLOW_REF}."
           echo "--------------"
           echo "Run ID/Number: ${GITHUB_RUN_ID} / ${GITHUB_RUN_NUMBER}"
           echo "Source Branch: ${GITHUB_REPOSITORY:-}/${GITHUB_REF_NAME:-unknown}"
           echo "Commit SHA:    ${GITHUB_SHA}"
           echo "--------------"
           echo "Note:  This artifact was auto-generated by a CI build, and is not an official signed release."
           echo "       It is intended for build pipeline testing only, not for production use or external distribution."
           echo ""
        } > DISCLAIMER.txt

        echo "⚠️ This CI workflow is only smoke testing the build pipeline; artifact outputs are not production-ready." >> "$GITHUB_STEP_SUMMARY"

    - name: Stage CI preview artifacts
      shell: bash
      run: |
        mkdir -p ci_preview
        for f in output/*.tar.gz; do
            base="${f%.tar.gz}"
            cp "$f" "ci_preview/${base##*/}_ci-${GITHUB_RUN_NUMBER}.tar.gz"
        done
        cp DISCLAIMER.txt ci_preview/

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: poe-gen-tool_ci_preview
        path: ci_preview/
        retention-days: 7
        if-no-files-found: warn
